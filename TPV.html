<hr>

<h3>Pedido</h3>
<div id="list">(vacío)</div>

<!-- BOTONES RÁPIDOS -->
<button class="fast" onclick="repeat()">➕ +1 último</button>
<button class="fast" onclick="addLast5()">➕ +5 último</button>

<button class="act" onclick="undo()">↩ Último</button>
<button class="del" onclick="clearAll()">🗑 Borrar</button>
<button class="ok" onclick="pay()">💶 Cobrar</button>

<script>

let total = 0;
let items = [];
let lastItem = null;

// sonido click
function beep(){
  try{
    let ctx = new (window.AudioContext || window.webkitAudioContext)();
    let osc = ctx.createOscillator();
    osc.frequency.value = 800;
    osc.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.05);
  }catch(e){}
}

function add(price,name){
  total += price;
  items.push({name:name, price:price});
  lastItem = {name:name, price:price};
  beep();
  update();
}

function repeat(){
  if(!lastItem) return;
  add(lastItem.price, lastItem.name);
}

function addLast5(){
  if(!lastItem) return;
  for(let i=0;i<5;i++){
    add(lastItem.price, lastItem.name);
  }
}

function undo(){
  if(items.length === 0) return;

  let last = items.pop();
  total -= last.price;

  update();
}

function clearAll(){
  total = 0;
  items = [];
  lastItem = null;
  update();
}

function update(){

  document.getElementById("total").innerText = total.toFixed(2) + " €";

  if(items.length === 0){
    document.getElementById("list").innerHTML = "(vacío)";
    return;
  }

  let count = {};

  for(let i of items){
    count[i.name] = (count[i.name] || 0) + 1;
  }

  let html = "";

  for(let k in count){
    html += `${k} x${count[k]}<br>`;
  }

  document.getElementById("list").innerHTML = html;
}

function pay(){
  let paid = prompt("¿Cuánto te pagan?");
  paid = parseFloat(paid);

  if(isNaN(paid)) return;

  let change = paid - total;

  alert(
    "TOTAL: " + total.toFixed(2) + "€\n" +
    "PAGADO: " + paid.toFixed(2) + "€\n" +
    "CAMBIO: " + change.toFixed(2) + "€"
  );

  clearAll();
}

update();

</script>
